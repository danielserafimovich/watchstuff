<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #2d3436; --accent: #00b894; --vimeo: #1ab7ea; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Montserrat', sans-serif; background: var(--bg); overflow: hidden; }

        /* --- Math Quiz Layer --- */
        #quiz-mode {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: white; z-index: 9999; transition: background 0.3s ease;
        }
        .quiz-container { width: 400px; text-align: center; }
        #question { font-size: 32px; font-weight: 300; margin-bottom: 20px; color: #2d3436; }
        #math-input {
            width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 6px;
            font-family: 'Montserrat'; font-size: 20px; text-align: center; outline: none;
        }
        
        /* Correct Answer Animation */
        @keyframes correctFlash {
            0% { background-color: white; }
            50% { background-color: #c2fbd7; }
            100% { background-color: white; }
        }
        .flash-success { animation: correctFlash 0.5s ease; }

        /* --- Workspace Layer --- */
        #workspace { width: 100%; height: 100%; background: #f4f7f6; position: relative; }
        
        #float-window {
            position: absolute; top: 80px; left: 80px; width: 640px; height: 400px;
            background: #fff; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; overflow: hidden; border: 1px solid #ddd;
        }

        /* Minimalist Top Bar */
        .top-bar {
            height: 32px; background: #f8f9fa; color: #333; display: flex;
            align-items: center; padding: 0 10px; cursor: move; font-size: 12px;
            justify-content: space-between; user-select: none; border-bottom: 1px solid #ddd;
        }
        
        .close-btn {
            cursor: pointer; font-size: 18px; font-weight: 300; padding: 0 5px; color: #999;
        }
        .close-btn:hover { color: #ff7675; }

        .controls { padding: 8px; background: #fff; display: flex; gap: 8px; border-bottom: 1px solid #eee; }
        .controls input { flex: 1; padding: 4px 8px; font-size: 11px; border: 1px solid #ddd; border-radius: 2px; }
        .controls button { background: #636e72; color: white; border: none; padding: 4px 12px; border-radius: 2px; cursor: pointer; font-size: 10px; }
        
        iframe { flex: 1; border: none; background: #000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="quiz-mode">
        <div class="quiz-container">
            <div id="question">24 + 12 = ?</div>
            <input type="number" id="math-input" placeholder="Type answer..." autocomplete="off">
        </div>
    </div>

    <div id="workspace">
        <div id="float-window">
            <div class="top-bar" id="handle">
                <span>Vimeo Player</span>
                <span class="close-btn" onclick="toggleView()">×</span>
            </div>
            <div class="controls">
                <input type="text" id="vimeo-id" placeholder="Vimeo ID">
                <button onclick="loadVimeo()">LOAD</button>
            </div>
            <iframe id="vimeo-frame" src="https://player.vimeo.com/video/76979871" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const quizLayer = document.getElementById('quiz-mode');
        const input = document.getElementById('math-input');
        const qText = document.getElementById('question');
        let ans = 36;

        // --- Math Engine with Animation ---
        function newQ() {
            // Trigger animation on the background
            quizLayer.classList.add('flash-success');
            setTimeout(() => quizLayer.classList.remove('flash-success'), 500);

            let a = Math.floor(Math.random() * 50);
            let b = Math.floor(Math.random() * 50);
            ans = a + b;
            qText.innerText = `${a} + ${b} = ?`;
            input.value = "";
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (parseInt(input.value) === ans) {
                    newQ();
                } else {
                    input.style.borderColor = '#ff7675';
                    setTimeout(() => input.style.borderColor = '#eee', 500);
                }
            }
        });

        // --- Toggle Logic ---
        function toggleView() {
            quizLayer.classList.toggle('hidden');
            if (!quizLayer.classList.contains('hidden')) {
                input.focus();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                toggleView();
            }
        });

        // --- Vimeo Loader ---
        function loadVimeo() {
            const id = document.getElementById('vimeo-id').value.trim();
            if(id) {
                document.getElementById('vimeo-frame').src = `https://player.vimeo.com/video/${id}`;
            }
        }

        // --- Draggable Logic ---
        const win = document.getElementById('float-window');
        const handle = document.getElementById('handle');
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        handle.addEventListener("mousedown", (e) => {
            if (e.target.classList.contains('close-btn')) return;
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
            active = true;
        });

        document.addEventListener("mousemove", (e) => {
            if (active) {
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
                xOffset = currentX;
                yOffset = currentY;
                win.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        });

        document.addEventListener("mouseup", () => active = false);
        
        // Initial focus
        input.focus();
    </script>
</body>
</html>
