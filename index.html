<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #2d3436; --accent: #00b894; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Montserrat', sans-serif; background: var(--bg); overflow: hidden; }

        /* --- Math Quiz Layer --- */
        #quiz-mode {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: white; z-index: 9999; transition: background 0.2s ease;
        }
        #question { font-size: 32px; font-weight: 300; margin-bottom: 20px; color: #2d3436; }
        #math-input {
            width: 300px; padding: 12px; border: 2px solid #eee; border-radius: 6px;
            font-family: 'Montserrat'; font-size: 20px; text-align: center; outline: none;
        }
        
        @keyframes correctFlash {
            0% { background-color: white; }
            50% { background-color: #00b894; }
            100% { background-color: white; }
        }
        .flash-success { animation: correctFlash 0.4s ease-out; }

        /* --- Workspace Layer --- */
        #workspace { width: 100%; height: 100%; background: #f4f7f6; position: relative; }
        
        #float-window {
            position: absolute; top: 80px; left: 80px; width: 640px; height: 400px;
            background: #fff; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; overflow: hidden; border: 1px solid #ddd;
        }

        .top-bar {
            height: 32px; background: #f8f9fa; color: #333; display: flex;
            align-items: center; padding: 0 10px; cursor: move; font-size: 12px;
            justify-content: space-between; user-select: none; border-bottom: 1px solid #ddd;
        }
        
        .close-btn { cursor: pointer; font-size: 20px; color: #999; }
        .close-btn:hover { color: #ff7675; }

        .controls { padding: 8px; background: #fff; display: flex; gap: 8px; border-bottom: 1px solid #eee; }
        .controls input { flex: 1; padding: 4px 8px; font-size: 11px; border: 1px solid #ddd; border-radius: 2px; }
        .controls button { background: #636e72; color: white; border: none; padding: 4px 12px; border-radius: 2px; cursor: pointer; font-size: 10px; }
        
        /* Direct Video Styling */
        video { width: 100%; height: 100%; background: #000; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="quiz-mode">
        <div id="question">12 + 13 = ?</div>
        <input type="number" id="math-input" placeholder="Answer..." autocomplete="off">
    </div>

    <div id="workspace">
        <div id="float-window">
            <div class="top-bar" id="handle">
                <span>Direct CDN Stream</span>
                <span class="close-btn" onclick="toggleView()">×</span>
            </div>
            <div class="controls">
                <input type="text" id="video-url" placeholder="Paste Direct .mp4 URL (from vimeocdn.com)">
                <button onclick="loadDirectVideo()">LOAD SOURCE</button>
            </div>
            <video id="cdn-player" controls autoplay></video>
        </div>
    </div>

    <script>
        const quizLayer = document.getElementById('quiz-mode');
        const input = document.getElementById('math-input');
        const qText = document.getElementById('question');
        const videoElement = document.getElementById('cdn-player');
        let ans = 25;

        // --- Math Engine ---
        function newQ() {
            quizLayer.classList.add('flash-success');
            setTimeout(() => quizLayer.classList.remove('flash-success'), 400);

            let a = Math.floor(Math.random() * 50);
            let b = Math.floor(Math.random() * 50);
            ans = a + b;
            qText.innerText = `${a} + ${b} = ?`;
            input.value = "";
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && parseInt(input.value) === ans) newQ();
        });

        // --- Toggle Logic ---
        function toggleView() {
            quizLayer.classList.toggle('hidden');
            if (!quizLayer.classList.contains('hidden')) input.focus();
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                toggleView();
            }
        });

        // --- Direct CDN Loader ---
        function loadDirectVideo() {
            const url = document.getElementById('video-url').value.trim();
            if(url) {
                videoElement.src = url;
                videoElement.load();
            }
        }

        // --- Draggable Logic ---
        const win = document.getElementById('float-window');
        const handle = document.getElementById('handle');
        let active = false, xOffset = 0, yOffset = 0, initialX, initialY;

        handle.addEventListener("mousedown", (e) => {
            if (e.target.className === 'close-btn') return;
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
            active = true;
        });

        document.addEventListener("mousemove", (e) => {
            if (active) {
                xOffset = e.clientX - initialX;
                yOffset = e.clientY - initialY;
                win.style.transform = `translate3d(${xOffset}px, ${yOffset}px, 0)`;
            }
        });

        document.addEventListener("mouseup", () => active = false);
        input.focus();
    </script>
</body>
</html>
