<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Evaluation System</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #ffffff;
            --text-color: #2d3436;
            --accent: #0984e3;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            overflow: hidden;
        }

        /* --- Quiz Overlay (The "Disguise") --- */
        #quiz-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            z-index: 1000;
            transition: opacity 0.2s ease-in-out;
        }

        .quiz-container {
            max-width: 600px;
            padding: 40px;
        }

        h2 { font-weight: 700; margin-bottom: 10px; }
        p { font-weight: 300; color: #636e72; }

        .question-box {
            margin-top: 30px;
            border-left: 4px solid var(--accent);
            padding-left: 20px;
        }

        /* --- Video Mode (The Hidden Content) --- */
        #video-mode {
            width: 100%;
            height: 100%;
            background: #f1f2f6;
            display: block;
        }

        #draggable-container {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 640px;
            height: 360px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            resize: both; /* Native resizing */
            overflow: auto;
            cursor: move;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: auto;
        }

        .handle {
            height: 30px;
            background: #2d3436;
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: white;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="quiz-mode">
        <div class="quiz-container">
            <p>Module 4: Logical Reasoning</p>
            <h2>Question 14: Analyze the sequence below.</h2>
            <div class="question-box">
                <p>If $x^2 + y = 14$ and $y = 5$, determine the value of $x$ for all positive integers.</p>
            </div>
            <p style="margin-top: 50px; font-size: 12px; opacity: 0.5;">Awaiting input...</p>
        </div>
    </div>

    <div id="video-mode">
        <div id="draggable-container">
            <div class="handle" id="drag-handle">Workspace - Drag Me</div>
            <iframe src="https://www.youtube.com/embed/videoseries?list=PL38E619E40409F369" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const quiz = document.getElementById('quiz-mode');
        const container = document.getElementById('draggable-container');
        const handle = document.getElementById('drag-handle');

        // --- Toggle Logic ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Prevent page scrolling
                quiz.classList.toggle('hidden');
            }
        });

        // --- Dragging Logic ---
        let isDragging = false;
        let offset = { x: 0, y: 0 };

        handle.addEventListener('mousedown', (e) => {
            isDragging = true;
            offset.x = e.clientX - container.offsetLeft;
            offset.y = e.clientY - container.offsetTop;
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                container.style.left = (e.clientX - offset.x) + 'px';
                container.style.top = (e.clientY - offset.y) + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });
    </script>
</body>
</html>
