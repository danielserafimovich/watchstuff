<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Video Page</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .video-container {
            width: 80%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        h1 { color: #333; }
    </style>
</head>
<body>

    <h1>My Favorite Video</h1>
    
    <div class="video-container">
        <iframe 
            src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
